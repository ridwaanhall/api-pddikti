<!doctype html>
<html lang="en">
    <head>
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1" />
        <title>{% block title %}Home | PDDikti API{% endblock %}</title>
        <meta
            name="description"
            content="{% block meta_description %}PDDikti API provides structured access to Indonesian higher education data including universities, study programs, lecturers, and students.{% endblock %}"
        />
        <meta name="author" content="ridwaanhall" />
        <meta name="theme-color" content="#09090b" />
        <link rel="canonical" href="{% block canonical_url %}{{ request.url if request is defined else 'https://pddikti.rone.dev/' }}{% endblock %}" />

        <script type="application/ld+json">
            {
                "@context": "https://schema.org",
                "@type": "WebSite",
                "name": "PDDikti API",
                "url": "{{ public_base_url|default('https://pddikti.rone.dev') }}/"
            }
        </script>

        <!-- Elegant Typography: Playfair Display for headings, Plus Jakarta Sans for UI, JetBrains Mono for code -->
        <link rel="preconnect" href="https://fonts.googleapis.com" />
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
        <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400..800;1,400..800&family=Plus+Jakarta+Sans:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />

        <link rel="icon" href="https://mlbb-card.rone.dev/static/favicon.ico" />
        <script src="https://cdn.tailwindcss.com"></script>
        <script>
            tailwind.config = {
                theme: {
                    extend: {
                        fontFamily: {
                            sans: ['"Plus Jakarta Sans"', 'sans-serif'],
                            serif: ['"Playfair Display"', 'serif'],
                            mono: ['"JetBrains Mono"', 'monospace'],
                        },
                        colors: {
                            gold: {
                                400: '#d4af37',
                                500: '#c8a97e', // Champagne gold
                                600: '#b59871',
                            }
                        }
                    }
                }
            }
        </script>
        <style>
            :root {
                --scroll-thumb: #3f3f46;
                --scroll-track: #09090b;
            }
            body { font-family: 'Plus Jakarta Sans', sans-serif; }
            * { scrollbar-width: thin; scrollbar-color: var(--scroll-thumb) var(--scroll-track); }
            *::-webkit-scrollbar { width: 6px; height: 6px; }
            *::-webkit-scrollbar-track { background: var(--scroll-track); }
            *::-webkit-scrollbar-thumb { background: var(--scroll-thumb); border-radius: 10px; }
            code, pre, kbd, samp { font-family: 'JetBrains Mono', monospace; }
        </style>
        {% block head %}{% endblock %}
    </head>
    <body class="min-h-screen bg-[#09090b] text-zinc-300 antialiased selection:bg-gold-500/30 selection:text-gold-400">
        {% set active = active_page|default('landing') %}
        
        <!-- Subtle radial background glow -->
        <div class="fixed inset-0 z-[-1] bg-[radial-gradient(ellipse_80%_80%_at_50%_-20%,rgba(200,169,126,0.05),transparent)]"></div>

        <div class="flex min-h-screen flex-col">
            <header class="sticky top-0 z-50 w-full border-b border-zinc-800/60 bg-[#09090b]/80 backdrop-blur-md">
                <nav class="mx-auto flex w-full max-w-7xl flex-wrap items-center justify-between gap-4 px-6 py-5 lg:px-8">
                    <a href="/" class="group flex items-center gap-3">
                        <span class="font-serif text-xl font-medium tracking-wide text-zinc-100 transition-colors group-hover:text-gold-500">
                            PDDikti API
                        </span>
                    </a>

                    <div class="flex flex-wrap items-center gap-6 text-[11px] font-medium uppercase tracking-[0.2em] text-zinc-500">
                        <a href="/" class="transition-colors duration-300 {% if active == 'landing' %}text-gold-500{% else %}hover:text-zinc-200{% endif %}">Home</a>
                        <a href="/web" class="transition-colors duration-300 {% if active == 'web' %}text-gold-500{% else %}hover:text-zinc-200{% endif %}">Web API</a>
                        <div class="h-3 w-px bg-zinc-800"></div>
                        <a href="/api/" class="transition-colors duration-300 hover:text-zinc-200">API Root</a>
                        <a href="/api/docs" class="transition-colors duration-300 hover:text-zinc-200">Swagger</a>
                        <a href="/api/redoc" class="transition-colors duration-300 hover:text-zinc-200">ReDoc</a>
                    </div>
                </nav>
            </header>

            <main class="flex-grow">
                <div class="mx-auto w-full max-w-7xl px-6 py-8 lg:px-8">
                    {% block content %}{% endblock %}
                </div>
            </main>

            <footer class="mt-auto border-t border-zinc-900 bg-[#060608]">
                <div class="mx-auto flex w-full max-w-7xl flex-col items-center justify-between gap-4 px-6 py-8 sm:flex-row lg:px-8">
                    <div class="flex flex-col gap-1">
                        <p class="font-serif text-lg text-zinc-400">PDDikti API Platform</p>
                        <p class="text-xs text-zinc-600">v{{ api_version|default('4.1.0') }} &bull; Higher Education Data</p>
                    </div>
                    <div class="flex flex-col items-end gap-1 text-right">
                        <p class="text-[11px] tracking-wider text-zinc-500 uppercase">Data &copy; PDDikti</p>
                        <p class="text-xs text-zinc-600">Maintained by <span class="text-gold-600">ridwaanhall</span> / RoneAI</p>
                    </div>
                </div>
            </footer>
        </div>
    </body>
</html>
